<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Herlytics</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<nav>
  <a class="nav-logo" href="../index.html">Herlytics<span>.</span></a>
  <ul class="nav-links"><li><a href="../index.html#features">Features</a></li></ul>
  <a href="signup.html" class="nav-cta">Create Account</a>
</nav>

<div class="form-page">
  <div class="form-box">
    <div style="text-align:center;margin-bottom:32px;">
      <div style="width:56px;height:56px;background:linear-gradient(135deg,var(--teal-400),var(--teal-600));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto 16px;">🌿</div>
      <h2>Welcome back</h2>
      <p class="form-sub">Sign in to your Herlytics account</p>
    </div>

    <div id="errorMsg" style="display:none;background:#fee2e2;color:#991b1b;padding:12px 16px;border-radius:8px;font-size:.88rem;margin-bottom:16px;text-align:center;"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" name="username" placeholder="your_username" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>
      <div style="display:flex;justify-content:flex-end;margin-bottom:20px;">
        <a href="#" class="form-link" style="font-size:.85rem;">Forgot password?</a>
      </div>
      <button type="submit" class="btn-primary" id="loginBtn" style="width:100%;justify-content:center;">Sign In</button>
    </form>

    <p style="text-align:center;margin-top:24px;font-size:.9rem;color:var(--text-muted);">
      Don't have an account? <a href="signup.html" class="form-link">Sign up free</a>
    </p>
  </div>
</div>

<script>
const API = window.location.origin + '/api';
const errorEl = document.getElementById('errorMsg');

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  errorEl.style.display = 'none';

  const btn = document.getElementById('loginBtn');
  btn.textContent = 'Signing in…';
  btn.disabled = true;

  try {
    const res = await fetch(API + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      })
    });

    const data = await res.json();
    console.log('Login response:', data);

    if (data.success) {
      sessionStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = 'dashboard.html';
    } else {
      alert(data.error || 'Login failed.');
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  } catch (err) {
    console.error('Login Error:', err);
    alert('Cannot connect to server. Make sure the backend is running.');
    btn.textContent = 'Sign In';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
